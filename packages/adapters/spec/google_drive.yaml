id: google_drive
name: Google Drive
version: 1.0.0
description: Google Drive API — files and folders.
homepage: https://developers.google.com/drive/api

api_base: https://www.googleapis.com/drive/v3

auth:
  kind: oauth2
  authorize_url: https://accounts.google.com/o/oauth2/v2/auth
  token_url: https://oauth2.googleapis.com/token
  default_scopes:
    - https://www.googleapis.com/auth/drive.readonly
    - https://www.googleapis.com/auth/drive.file
  pkce: true

actions:
  - id: list_files
    description: List files matching a query.
    expected_use: Find a doc by name or modification date.
    auto_execute: true
    required_scopes: [https://www.googleapis.com/auth/drive.readonly]
    risk: { category: search, sensitivity: medium }
    http:
      method: GET
      path: "/files"
    params:
      - { name: q, in: query, type: string, description: "Drive search query, e.g. \"name contains 'budget'\"" }
      - { name: pageSize, in: query, type: integer, default: 25 }
      - { name: fields, in: query, type: string, default: "files(id,name,mimeType,modifiedTime,owners)" }

  - id: get_file
    description: Fetch a file's metadata.
    expected_use: Inspect ownership, type, and timestamps.
    auto_execute: true
    required_scopes: [https://www.googleapis.com/auth/drive.readonly]
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: "/files/{fileId}"
    params:
      - { name: fileId, in: path, required: true, type: string }

  - id: download_file
    description: Download a file's content.
    expected_use: Read a doc's body for summarization.
    auto_execute: true
    required_scopes: [https://www.googleapis.com/auth/drive.readonly]
    risk: { category: read, sensitivity: high }
    http:
      method: GET
      path: "/files/{fileId}"
    params:
      - { name: fileId, in: path, required: true, type: string }
      - { name: alt, in: query, type: string, default: media }

  - id: create_file
    description: Upload a new file.
    expected_use: Save a generated artifact.
    auto_execute: false
    required_scopes: [https://www.googleapis.com/auth/drive.file]
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/files"
    params:
      - { name: name, in: body, required: true, type: string }
      - { name: mimeType, in: body, type: string }
      - { name: parents, in: body, type: array }

  - id: delete_file
    description: Permanently delete a file.
    expected_use: Clean up generated artifacts.
    auto_execute: false
    required_scopes: [https://www.googleapis.com/auth/drive.file]
    risk: { category: delete, sensitivity: high }
    http:
      method: DELETE
      path: "/files/{fileId}"
    params:
      - { name: fileId, in: path, required: true, type: string }

  - id: update_file
    description: Update a file's metadata (rename, move, change description).
    expected_use: Rename a generated doc or move it into a different folder.
    auto_execute: false
    required_scopes: [https://www.googleapis.com/auth/drive.file]
    risk: { category: write, sensitivity: medium }
    http:
      method: PATCH
      path: "/files/{fileId}"
    params:
      - { name: fileId, in: path, required: true, type: string }
      - { name: name, in: body, type: string }
      - { name: description, in: body, type: string }
      - { name: addParents, in: query, type: string }
      - { name: removeParents, in: query, type: string }

  - id: copy_file
    description: Make a copy of a file.
    expected_use: Duplicate a template before edits.
    auto_execute: false
    required_scopes: [https://www.googleapis.com/auth/drive.file]
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/files/{fileId}/copy"
    params:
      - { name: fileId, in: path, required: true, type: string }
      - { name: name, in: body, type: string }
      - { name: parents, in: body, type: array }

  - id: create_folder
    description: Create a new folder.
    expected_use: Organize generated artifacts under a project folder.
    auto_execute: false
    required_scopes: [https://www.googleapis.com/auth/drive.file]
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/files"
    params:
      - { name: name, in: body, required: true, type: string }
      - { name: mimeType, in: body, type: string, default: "application/vnd.google-apps.folder" }
      - { name: parents, in: body, type: array }

  - id: search_files
    description: Search files by full-text and metadata.
    expected_use: Find docs containing specific text or owned by a user.
    auto_execute: true
    required_scopes: [https://www.googleapis.com/auth/drive.readonly]
    risk: { category: search, sensitivity: medium }
    http:
      method: GET
      path: "/files"
    params:
      - { name: q, in: query, required: true, type: string }
      - { name: pageSize, in: query, type: integer, default: 25 }
      - { name: orderBy, in: query, type: string }
      - { name: fields, in: query, type: string, default: "files(id,name,mimeType,modifiedTime,owners)" }

  - id: share_file
    description: Grant a permission (reader, commenter, writer) to a user or domain.
    expected_use: Share a generated artifact with a teammate or external reviewer.
    auto_execute: false
    required_scopes: [https://www.googleapis.com/auth/drive.file]
    risk: { category: write, sensitivity: high }
    http:
      method: POST
      path: "/files/{fileId}/permissions"
    params:
      - { name: fileId, in: path, required: true, type: string }
      - { name: type, in: body, required: true, type: string, enum: [user, group, domain, anyone] }
      - { name: role, in: body, required: true, type: string, enum: [reader, commenter, writer, owner] }
      - { name: emailAddress, in: body, type: string }
      - { name: domain, in: body, type: string }

  - id: export_file
    description: Export a Google-native doc to another format (PDF, DOCX, etc.).
    expected_use: Convert a Google Doc/Sheet/Slide into a portable file format.
    auto_execute: true
    required_scopes: [https://www.googleapis.com/auth/drive.readonly]
    risk: { category: read, sensitivity: high }
    http:
      method: GET
      path: "/files/{fileId}/export"
    params:
      - { name: fileId, in: path, required: true, type: string }
      - { name: mimeType, in: query, required: true, type: string, description: "e.g. application/pdf, application/vnd.openxmlformats-officedocument.wordprocessingml.document" }

  - id: list_permissions
    description: List sharing permissions on a file.
    expected_use: Audit who has access before sharing more broadly.
    auto_execute: true
    required_scopes: [https://www.googleapis.com/auth/drive.readonly]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/files/{fileId}/permissions"
    params:
      - { name: fileId, in: path, required: true, type: string }

  - id: delete_permission
    description: Revoke a sharing permission from a file.
    expected_use: Remove a collaborator's access.
    auto_execute: false
    required_scopes: [https://www.googleapis.com/auth/drive.file]
    risk: { category: delete, sensitivity: high }
    http:
      method: DELETE
      path: "/files/{fileId}/permissions/{permissionId}"
    params:
      - { name: fileId, in: path, required: true, type: string }
      - { name: permissionId, in: path, required: true, type: string }

  - id: list_revisions
    description: List revision history for a file.
    expected_use: Audit recent edits or roll back to a prior version.
    auto_execute: true
    required_scopes: [https://www.googleapis.com/auth/drive.readonly]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/files/{fileId}/revisions"
    params:
      - { name: fileId, in: path, required: true, type: string }

  - id: get_storage_quota
    description: Get the user's Drive storage quota and usage.
    expected_use: Check available space before uploading large files.
    auto_execute: true
    required_scopes: [https://www.googleapis.com/auth/drive.readonly]
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: "/about"
    params:
      - { name: fields, in: query, type: string, default: "storageQuota" }

  - id: trash_file
    description: Move a file to trash (soft-delete).
    expected_use: Soft-delete a generated artifact (can be restored).
    auto_execute: false
    required_scopes: [https://www.googleapis.com/auth/drive.file]
    risk: { category: delete, sensitivity: medium }
    http:
      method: PATCH
      path: "/files/{fileId}"
    params:
      - { name: fileId, in: path, required: true, type: string }
      - { name: trashed, in: body, required: true, type: boolean, default: true }

  - id: untrash_file
    description: Restore a file from trash.
    expected_use: Recover a soft-deleted artifact.
    auto_execute: false
    required_scopes: [https://www.googleapis.com/auth/drive.file]
    risk: { category: write, sensitivity: medium }
    http:
      method: PATCH
      path: "/files/{fileId}"
    params:
      - { name: fileId, in: path, required: true, type: string }
      - { name: trashed, in: body, required: true, type: boolean, default: false }

  - id: list_changes
    description: List recent Drive changes for the user.
    expected_use: Detect newly-shared or modified files since a checkpoint.
    auto_execute: true
    required_scopes: [https://www.googleapis.com/auth/drive.readonly]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/changes"
    params:
      - { name: pageToken, in: query, required: true, type: string }
      - { name: pageSize, in: query, type: integer, default: 100 }

  - id: get_revision
    description: Get a single revision's metadata.
    expected_use: Inspect a prior revision before rolling back.
    auto_execute: true
    required_scopes: [https://www.googleapis.com/auth/drive.readonly]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/files/{fileId}/revisions/{revisionId}"
    params:
      - { name: fileId, in: path, required: true, type: string }
      - { name: revisionId, in: path, required: true, type: string }

  - id: get_about
    description: Get the calling user's Drive profile and storage info.
    expected_use: Identify the active Drive account.
    auto_execute: true
    required_scopes: [https://www.googleapis.com/auth/drive.readonly]
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: "/about"
    params:
      - { name: fields, in: query, type: string, default: "user,storageQuota" }
