id: linear
name: Linear
version: 1.0.0
description: Linear GraphQL API — issues, projects, teams.
homepage: https://developers.linear.app

api_base: https://api.linear.app/graphql

auth:
  kind: oauth2
  authorize_url: https://linear.app/oauth/authorize
  token_url: https://api.linear.app/oauth/token
  default_scopes:
    - read
    - write
  pkce: false

actions:
  - id: list_issues
    description: List recent issues across teams.
    expected_use: Browse open work for triage / context.
    auto_execute: true
    required_scopes: [read]
    risk: { category: read, sensitivity: low }
    http:
      method: POST
      path: "/"
    params:
      - name: query
        in: body
        required: true
        type: string
        default: |
          query Issues($first: Int!) { issues(first: $first) { nodes { id identifier title state { name } assignee { name } } } }
      - { name: variables, in: body, type: object, default: { first: 25 } }

  - id: create_issue
    description: Create a new issue in a team.
    expected_use: File a bug or task as part of triage.
    auto_execute: false
    required_scopes: [write]
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/"
    params:
      - name: query
        in: body
        required: true
        type: string
        default: |
          mutation CreateIssue($input: IssueCreateInput!) { issueCreate(input: $input) { issue { id identifier url } } }
      - { name: variables, in: body, required: true, type: object }

  - id: comment_on_issue
    description: Post a comment on an issue.
    expected_use: Add status updates or replies.
    auto_execute: false
    required_scopes: [write]
    risk: { category: write, sensitivity: low }
    http:
      method: POST
      path: "/"
    params:
      - name: query
        in: body
        required: true
        type: string
        default: |
          mutation Comment($input: CommentCreateInput!) { commentCreate(input: $input) { comment { id } } }
      - { name: variables, in: body, required: true, type: object }

  - id: get_issue
    description: Fetch a single issue by id or identifier.
    expected_use: Read full issue body, state, and metadata.
    auto_execute: true
    required_scopes: [read]
    risk: { category: read, sensitivity: low }
    http:
      method: POST
      path: "/"
    params:
      - name: query
        in: body
        required: true
        type: string
        default: |
          query GetIssue($id: String!) { issue(id: $id) { id identifier title description state { name } priority assignee { name } team { name } createdAt updatedAt url } }
      - { name: variables, in: body, required: true, type: object }

  - id: update_issue
    description: Update fields on an existing issue (title, state, assignee, priority).
    expected_use: Move an issue between states, reassign, or rename.
    auto_execute: false
    required_scopes: [write]
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/"
    params:
      - name: query
        in: body
        required: true
        type: string
        default: |
          mutation UpdateIssue($id: String!, $input: IssueUpdateInput!) { issueUpdate(id: $id, input: $input) { issue { id identifier title state { name } } } }
      - { name: variables, in: body, required: true, type: object }

  - id: list_projects
    description: List projects across teams.
    expected_use: Discover active projects for grouping or filtering.
    auto_execute: true
    required_scopes: [read]
    risk: { category: read, sensitivity: low }
    http:
      method: POST
      path: "/"
    params:
      - name: query
        in: body
        required: true
        type: string
        default: |
          query Projects($first: Int!) { projects(first: $first) { nodes { id name state startDate targetDate teams { nodes { name } } } } }
      - { name: variables, in: body, type: object, default: { first: 25 } }

  - id: list_teams
    description: List teams in the workspace.
    expected_use: Resolve a team name for issue creation or filtering.
    auto_execute: true
    required_scopes: [read]
    risk: { category: read, sensitivity: low }
    http:
      method: POST
      path: "/"
    params:
      - name: query
        in: body
        required: true
        type: string
        default: |
          query Teams { teams { nodes { id name key description } } }
      - { name: variables, in: body, type: object, default: {} }

  - id: get_viewer
    description: Get the authenticated user's profile.
    expected_use: Identify the current user (whoami) for self-assignment or audit.
    auto_execute: true
    required_scopes: [read]
    risk: { category: read, sensitivity: low }
    http:
      method: POST
      path: "/"
    params:
      - name: query
        in: body
        required: true
        type: string
        default: |
          query Viewer { viewer { id name email displayName } }
      - { name: variables, in: body, type: object, default: {} }

  - id: delete_issue
    description: Delete an issue permanently.
    expected_use: Remove an issue created in error; almost never invoked by an agent.
    auto_execute: false
    required_scopes: [write]
    risk: { category: delete, sensitivity: high }
    http:
      method: POST
      path: "/"
    params:
      - name: query
        in: body
        required: true
        type: string
        default: |
          mutation Delete($id: String!) { issueDelete(id: $id) { success } }
      - { name: variables, in: body, required: true, type: object }

  - id: search_issues
    description: Search issues by free-text filter.
    expected_use: Find issues matching a complex filter expression.
    auto_execute: true
    required_scopes: [read]
    risk: { category: search, sensitivity: low }
    http:
      method: POST
      path: "/"
    params:
      - name: query
        in: body
        required: true
        type: string
        default: |
          query Search($filter: IssueFilter!, $first: Int!) { issues(filter: $filter, first: $first) { nodes { id identifier title state { name } } } }
      - { name: variables, in: body, required: true, type: object }

  - id: list_workflow_states
    description: List workflow states for a team.
    expected_use: Discover available state ids before updating issues.
    auto_execute: true
    required_scopes: [read]
    risk: { category: read, sensitivity: low }
    http:
      method: POST
      path: "/"
    params:
      - name: query
        in: body
        required: true
        type: string
        default: |
          query States($teamId: String!) { workflowStates(filter: { team: { id: { eq: $teamId } } }) { nodes { id name type team { name } } } }
      - { name: variables, in: body, required: true, type: object }

  - id: list_labels
    description: List issue labels across teams.
    expected_use: Discover available labels for issue tagging.
    auto_execute: true
    required_scopes: [read]
    risk: { category: read, sensitivity: low }
    http:
      method: POST
      path: "/"
    params:
      - name: query
        in: body
        required: true
        type: string
        default: |
          query Labels($first: Int!) { issueLabels(first: $first) { nodes { id name color team { name } } } }
      - { name: variables, in: body, type: object, default: { first: 50 } }

  - id: list_members
    description: List active workspace members.
    expected_use: Resolve assignee ids before creating or updating issues.
    auto_execute: true
    required_scopes: [read]
    risk: { category: read, sensitivity: medium }
    http:
      method: POST
      path: "/"
    params:
      - name: query
        in: body
        required: true
        type: string
        default: |
          query Members { users { nodes { id name email active } } }
      - { name: variables, in: body, type: object, default: {} }

  - id: get_project
    description: Fetch a project by id.
    expected_use: Read full project metadata.
    auto_execute: true
    required_scopes: [read]
    risk: { category: read, sensitivity: low }
    http:
      method: POST
      path: "/"
    params:
      - name: query
        in: body
        required: true
        type: string
        default: |
          query Project($id: String!) { project(id: $id) { id name state startDate targetDate description } }
      - { name: variables, in: body, required: true, type: object }

  - id: create_project
    description: Create a new project.
    expected_use: Spin up a project for a new initiative.
    auto_execute: false
    required_scopes: [write]
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/"
    params:
      - name: query
        in: body
        required: true
        type: string
        default: |
          mutation Create($input: ProjectCreateInput!) { projectCreate(input: $input) { project { id name } } }
      - { name: variables, in: body, required: true, type: object }

  - id: update_project
    description: Update an existing project (rename, change state, adjust dates).
    expected_use: Move a project between states or update its scope.
    auto_execute: false
    required_scopes: [write]
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/"
    params:
      - name: query
        in: body
        required: true
        type: string
        default: |
          mutation Update($id: String!, $input: ProjectUpdateInput!) { projectUpdate(id: $id, input: $input) { project { id name state } } }
      - { name: variables, in: body, required: true, type: object }

  - id: list_comments
    description: List comments on an issue.
    expected_use: Read discussion history before replying.
    auto_execute: true
    required_scopes: [read]
    risk: { category: read, sensitivity: low }
    http:
      method: POST
      path: "/"
    params:
      - name: query
        in: body
        required: true
        type: string
        default: |
          query Comments($issueId: String!) { comments(filter: { issue: { id: { eq: $issueId } } }) { nodes { id body createdAt user { name } } } }
      - { name: variables, in: body, required: true, type: object }

  - id: assign_issue
    description: Assign a Linear issue to a user via GraphQL mutation.
    expected_use: Reassign an issue to a teammate.
    auto_execute: false
    required_scopes: []
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/"
    params:
      - { name: query, in: body, required: true, type: string, default: "mutation IssueUpdate($id: String!, $input: IssueUpdateInput!) { issueUpdate(id: $id, input: $input) { success issue { id assignee { id } } } }" }
      - { name: variables, in: body, type: object }

  - id: archive_project
    description: Archive a Linear project.
    expected_use: Retire a completed project.
    auto_execute: false
    required_scopes: []
    risk: { category: delete, sensitivity: medium }
    http:
      method: POST
      path: "/"
    params:
      - { name: query, in: body, required: true, type: string, default: "mutation ProjectArchive($id: String!) { projectArchive(id: $id) { success } }" }
      - { name: variables, in: body, type: object }

  - id: list_cycles
    description: List cycles (sprints) in Linear.
    expected_use: See current and upcoming sprints.
    auto_execute: true
    required_scopes: []
    risk: { category: read, sensitivity: low }
    http:
      method: POST
      path: "/"
    params:
      - { name: query, in: body, required: true, type: string, default: "query Cycles { cycles { nodes { id name startsAt endsAt } } }" }
      - { name: variables, in: body, type: object }

  - id: get_team
    description: Read a Linear team's details.
    expected_use: Inspect team membership and settings.
    auto_execute: true
    required_scopes: []
    risk: { category: read, sensitivity: low }
    http:
      method: POST
      path: "/"
    params:
      - { name: query, in: body, required: true, type: string, default: "query Team($id: String!) { team(id: $id) { id name key } }" }
      - { name: variables, in: body, type: object }

  - id: create_comment
    description: Create a comment on a Linear issue.
    expected_use: Add context or status update to an issue.
    auto_execute: false
    required_scopes: []
    risk: { category: write, sensitivity: low }
    http:
      method: POST
      path: "/"
    params:
      - { name: query, in: body, required: true, type: string, default: "mutation CommentCreate($input: CommentCreateInput!) { commentCreate(input: $input) { success } }" }
      - { name: variables, in: body, type: object }

  - id: move_issue
    description: Move an issue to a different team.
    expected_use: Reassign an issue to the correct team.
    auto_execute: false
    required_scopes: []
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/"
    params:
      - { name: query, in: body, required: true, type: string, default: "mutation IssueUpdate($id: String!, $input: IssueUpdateInput!) { issueUpdate(id: $id, input: $input) { success } }" }
      - { name: variables, in: body, type: object }

  - id: close_issue
    description: Close a Linear issue by transitioning it to a completed workflow state.
    expected_use: Mark an issue as Done; uses issueUpdate with the team's completed stateId under the hood.
    auto_execute: false
    required_scopes: [write]
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/"
    params:
      - { name: query, in: body, required: true, type: string, default: "mutation Close($id: String!, $input: IssueUpdateInput!) { issueUpdate(id: $id, input: $input) { success issue { id state { name } } } }" }
      - { name: variables, in: body, required: true, type: object }

notes: |
  Linear's API is GraphQL-only; every action POSTs to /graphql with
  `query` + `variables`. The YAML wraps that with default queries so an
  agent only has to provide variables.
