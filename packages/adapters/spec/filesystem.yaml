id: filesystem
name: Local Filesystem
version: 1.0.0
description: Local filesystem operations — read, write, create, delete, move, copy files and directories. Executed directly by the PDP; no upstream HTTP call.

auth:
  kind: local

actions:
  - id: read_file
    description: Read the contents of a file.
    expected_use: Read a text file, config, or source code file.
    auto_execute: true
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: /file/read
    params:
      - { name: path, in: query, required: true, type: string, description: Absolute path to the file }
      - { name: encoding, in: query, type: string, default: utf-8, enum: [utf-8, base64], description: Response encoding }

  - id: write_file
    description: Write or overwrite a file with new content.
    expected_use: Save generated content or update a configuration file.
    auto_execute: false
    risk: { category: write, sensitivity: high }
    http:
      method: POST
      path: /file/write
    params:
      - { name: path, in: body, required: true, type: string, description: Absolute path to the file }
      - { name: content, in: body, required: true, type: string, description: Content to write }
      - { name: encoding, in: body, type: string, default: utf-8, enum: [utf-8, base64], description: Encoding of content field }

  - id: create_file
    description: Create a new file; fails if the file already exists.
    expected_use: Initialise a new output or configuration file without overwriting an existing one.
    auto_execute: false
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: /file/create
    params:
      - { name: path, in: body, required: true, type: string, description: Absolute path for the new file }
      - { name: content, in: body, type: string, description: Initial content (empty string if omitted) }
      - { name: encoding, in: body, type: string, default: utf-8, enum: [utf-8, base64] }

  - id: delete_file
    description: Permanently delete a file.
    expected_use: Remove a temporary or obsolete file.
    auto_execute: false
    risk: { category: delete, sensitivity: high }
    http:
      method: DELETE
      path: /file/delete
    params:
      - { name: path, in: body, required: true, type: string, description: Absolute path of the file to delete }

  - id: move_file
    description: Move or rename a file.
    expected_use: Rename a file or relocate it within the allowed path prefix.
    auto_execute: false
    risk: { category: write, sensitivity: high }
    http:
      method: POST
      path: /file/move
    params:
      - { name: path, in: body, required: true, type: string, description: Source file path }
      - { name: destination, in: body, required: true, type: string, description: Destination path }

  - id: copy_file
    description: Copy a file to a new location.
    expected_use: Duplicate a file for backup or transformation.
    auto_execute: false
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: /file/copy
    params:
      - { name: path, in: body, required: true, type: string, description: Source file path }
      - { name: destination, in: body, required: true, type: string, description: Destination path }

  - id: list_dir
    description: List the contents of a directory (one level deep).
    expected_use: Discover files and subdirectories in a folder.
    auto_execute: true
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: /dir/list
    params:
      - { name: path, in: query, required: true, type: string, description: Absolute directory path }

  - id: tree_dir
    description: Recursively list a directory tree up to a configurable depth.
    expected_use: Understand the structure of a project or folder.
    auto_execute: true
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: /dir/tree
    params:
      - { name: path, in: query, required: true, type: string, description: Root directory path }
      - { name: depth, in: query, type: integer, default: 5, description: Maximum depth (capped at 10 by the PDP) }

  - id: create_dir
    description: Create a directory and any missing parent directories.
    expected_use: Set up a new project folder or output directory.
    auto_execute: false
    risk: { category: write, sensitivity: low }
    http:
      method: POST
      path: /dir/create
    params:
      - { name: path, in: body, required: true, type: string, description: Directory path to create }

  - id: delete_dir
    description: Delete an empty directory.
    expected_use: Remove a directory that has been cleared of its files.
    auto_execute: false
    risk: { category: delete, sensitivity: high }
    http:
      method: DELETE
      path: /dir/delete
    params:
      - { name: path, in: body, required: true, type: string, description: Directory path to delete }

  - id: delete_dir_recursive
    description: Recursively delete a directory and all its contents.
    expected_use: Remove a temporary build or scratch directory.
    auto_execute: false
    risk: { category: delete, sensitivity: high }
    http:
      method: DELETE
      path: /dir/delete_recursive
    params:
      - { name: path, in: body, required: true, type: string, description: Directory path to delete recursively }
