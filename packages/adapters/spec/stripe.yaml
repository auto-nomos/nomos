id: stripe
name: Stripe
version: 1.0.0
description: Stripe REST API — customers, payments, subscriptions.
homepage: https://docs.stripe.com/api

api_base: https://api.stripe.com/v1

auth:
  kind: oauth2
  authorize_url: https://connect.stripe.com/oauth/authorize
  token_url: https://connect.stripe.com/oauth/token
  default_scopes:
    - read_write
  pkce: false

actions:
  - id: list_customers
    description: List Stripe customers.
    expected_use: Look up customer ids before charging or refunding.
    auto_execute: true
    required_scopes: [read_write]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/customers"
    params:
      - { name: limit, in: query, type: integer, default: 25 }
      - { name: email, in: query, type: string }
    response:
      type: array
      sanitize:
        - { field: "data[].email", redact: true }
        - { field: "data[].phone", redact: true }

  - id: get_customer
    description: Retrieve a customer by id.
    expected_use: Fetch full customer record before action.
    auto_execute: true
    required_scopes: [read_write]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/customers/{customer_id}"
    params:
      - { name: customer_id, in: path, required: true, type: string }
    response:
      type: object
      sanitize:
        - { field: email, redact: true }
        - { field: phone, redact: true }

  - id: create_refund
    description: Refund a charge in part or in full.
    expected_use: Issue a refund as part of a customer-support flow.
    auto_execute: false
    required_scopes: [read_write]
    risk: { category: write, sensitivity: high }
    http:
      method: POST
      path: "/refunds"
    params:
      - { name: charge, in: form, required: true, type: string }
      - { name: amount, in: form, type: integer }
      - { name: reason, in: form, type: string, enum: [duplicate, fraudulent, requested_by_customer] }

  - id: list_subscriptions
    description: List active subscriptions for a customer.
    expected_use: Audit billing state.
    auto_execute: true
    required_scopes: [read_write]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/subscriptions"
    params:
      - { name: customer, in: query, type: string }
      - { name: status, in: query, type: string, default: active }
      - { name: limit, in: query, type: integer, default: 25 }

  - id: cancel_subscription
    description: Cancel a subscription immediately.
    expected_use: End a subscription as part of a churn or refund flow.
    auto_execute: false
    required_scopes: [read_write]
    risk: { category: delete, sensitivity: high }
    http:
      method: DELETE
      path: "/subscriptions/{subscription_id}"
    params:
      - { name: subscription_id, in: path, required: true, type: string }

  - id: get_subscription
    description: Retrieve a single subscription by id.
    expected_use: Read full subscription record before cancel or update.
    auto_execute: true
    required_scopes: [read_write]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/subscriptions/{subscription_id}"
    params:
      - { name: subscription_id, in: path, required: true, type: string }

  - id: create_customer
    description: Create a new customer record.
    expected_use: Provision a new buyer as part of onboarding.
    auto_execute: false
    required_scopes: [read_write]
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/customers"
    params:
      - { name: email, in: form, type: string }
      - { name: name, in: form, type: string }
      - { name: description, in: form, type: string }
      - { name: phone, in: form, type: string }

  - id: list_charges
    description: List recent charges.
    expected_use: Audit recent payment activity.
    auto_execute: true
    required_scopes: [read_write]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/charges"
    params:
      - { name: customer, in: query, type: string }
      - { name: limit, in: query, type: integer, default: 25 }

  - id: get_charge
    description: Retrieve a single charge by id.
    expected_use: Fetch full charge record before refunding.
    auto_execute: true
    required_scopes: [read_write]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/charges/{charge_id}"
    params:
      - { name: charge_id, in: path, required: true, type: string }

  - id: list_invoices
    description: List invoices for a customer.
    expected_use: Audit billing history.
    auto_execute: true
    required_scopes: [read_write]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/invoices"
    params:
      - { name: customer, in: query, type: string }
      - { name: status, in: query, type: string, enum: [draft, open, paid, uncollectible, void] }
      - { name: limit, in: query, type: integer, default: 25 }

  - id: get_invoice
    description: Retrieve a single invoice by id.
    expected_use: Fetch full invoice record for reconciliation.
    auto_execute: true
    required_scopes: [read_write]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/invoices/{invoice_id}"
    params:
      - { name: invoice_id, in: path, required: true, type: string }

  - id: list_payment_intents
    description: List payment intents.
    expected_use: Audit pending and recent payment intents.
    auto_execute: true
    required_scopes: [read_write]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/payment_intents"
    params:
      - { name: customer, in: query, type: string }
      - { name: limit, in: query, type: integer, default: 25 }

  - id: get_payment_intent
    description: Retrieve a single payment intent by id.
    expected_use: Inspect status and details of a payment intent.
    auto_execute: true
    required_scopes: [read_write]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/payment_intents/{payment_intent_id}"
    params:
      - { name: payment_intent_id, in: path, required: true, type: string }

  - id: create_payment_intent
    description: Create a new payment intent.
    expected_use: Start a charge flow for a customer.
    auto_execute: false
    required_scopes: [read_write]
    risk: { category: write, sensitivity: high }
    http:
      method: POST
      path: "/payment_intents"
    params:
      - { name: amount, in: form, required: true, type: integer }
      - { name: currency, in: form, required: true, type: string }
      - { name: customer, in: form, type: string }
      - { name: description, in: form, type: string }
      - { name: automatic_payment_methods, in: form, type: object }

  - id: capture_payment_intent
    description: Capture funds on a previously authorized payment intent.
    expected_use: Capture an authorized payment after fulfillment.
    auto_execute: false
    required_scopes: [read_write]
    risk: { category: write, sensitivity: high }
    http:
      method: POST
      path: "/payment_intents/{payment_intent_id}/capture"
    params:
      - { name: payment_intent_id, in: path, required: true, type: string }
      - { name: amount_to_capture, in: form, type: integer }

  - id: cancel_payment_intent
    description: Cancel a payment intent before it is captured.
    expected_use: Abandon a payment that should not proceed.
    auto_execute: false
    required_scopes: [read_write]
    risk: { category: write, sensitivity: high }
    http:
      method: POST
      path: "/payment_intents/{payment_intent_id}/cancel"
    params:
      - { name: payment_intent_id, in: path, required: true, type: string }
      - { name: cancellation_reason, in: form, type: string, enum: [duplicate, fraudulent, requested_by_customer, abandoned] }

  - id: update_customer
    description: Update an existing customer's profile fields.
    expected_use: Correct a name, email, or description on a customer record.
    auto_execute: false
    required_scopes: [read_write]
    risk: { category: write, sensitivity: high }
    http:
      method: POST
      path: "/customers/{customer_id}"
    params:
      - { name: customer_id, in: path, required: true, type: string }
      - { name: email, in: form, type: string }
      - { name: name, in: form, type: string }
      - { name: description, in: form, type: string }
      - { name: phone, in: form, type: string }

  - id: create_subscription
    description: Create a subscription for a customer.
    expected_use: Start recurring billing for a customer on one or more prices.
    auto_execute: false
    required_scopes: [read_write]
    risk: { category: write, sensitivity: high }
    http:
      method: POST
      path: "/subscriptions"
    params:
      - { name: customer, in: form, required: true, type: string }
      - { name: items, in: form, required: true, type: array, description: "Array of {price: <price_id>}." }
      - { name: trial_period_days, in: form, type: integer }

  - id: update_subscription
    description: Update an existing subscription.
    expected_use: Change plan, item set, or cancel-at-period-end.
    auto_execute: false
    required_scopes: [read_write]
    risk: { category: write, sensitivity: high }
    http:
      method: POST
      path: "/subscriptions/{subscription_id}"
    params:
      - { name: subscription_id, in: path, required: true, type: string }
      - { name: items, in: form, type: array }
      - { name: cancel_at_period_end, in: form, type: boolean }

  - id: list_products
    description: List active products in the catalog.
    expected_use: Browse the catalog before creating a price or subscription.
    auto_execute: true
    required_scopes: [read_write]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/products"
    params:
      - { name: active, in: query, type: boolean }
      - { name: limit, in: query, type: integer, default: 25 }

  - id: list_prices
    description: List prices, optionally filtered by product.
    expected_use: Pick a price id for subscription or payment intent creation.
    auto_execute: true
    required_scopes: [read_write]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/prices"
    params:
      - { name: product, in: query, type: string }
      - { name: active, in: query, type: boolean }
      - { name: limit, in: query, type: integer, default: 25 }

  - id: list_disputes
    description: List recent disputes.
    expected_use: Audit chargebacks and outstanding disputes.
    auto_execute: true
    required_scopes: [read_write]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/disputes"
    params:
      - { name: charge, in: query, type: string }
      - { name: payment_intent, in: query, type: string }
      - { name: limit, in: query, type: integer, default: 25 }

  - id: list_balance_transactions
    description: List balance transactions on the connected account.
    expected_use: Reconcile payouts, fees, and refunds.
    auto_execute: true
    required_scopes: [read_write]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/balance_transactions"
    params:
      - { name: type, in: query, type: string }
      - { name: limit, in: query, type: integer, default: 25 }

  - id: get_balance
    description: Retrieve the current account balance.
    expected_use: Inspect available funds before initiating a payout.
    auto_execute: true
    required_scopes: []
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/balance"
    params: []

  - id: list_setup_intents
    description: List recent SetupIntents.
    expected_use: Audit saved payment methods.
    auto_execute: true
    required_scopes: []
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/setup_intents"
    params:
      - { name: limit, in: query, type: integer, default: 10 }

  - id: list_refunds
    description: List refunds for a charge or customer.
    expected_use: Audit recent refunds.
    auto_execute: true
    required_scopes: []
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/refunds"
    params:
      - { name: charge, in: query, type: string }
      - { name: customer, in: query, type: string }
      - { name: limit, in: query, type: integer, default: 10 }

  - id: create_invoice
    description: Create an invoice for a customer.
    expected_use: Generate a one-off or scheduled invoice for collected charges.
    auto_execute: false
    required_scopes: [read_write]
    risk: { category: write, sensitivity: high }
    http:
      method: POST
      path: "/invoices"
    params:
      - { name: customer, in: form, required: true, type: string }
      - { name: collection_method, in: form, type: string, enum: [charge_automatically, send_invoice] }
      - { name: days_until_due, in: form, type: integer }
      - { name: description, in: form, type: string }
      - { name: auto_advance, in: form, type: boolean }

  - id: send_invoice
    description: Send an invoice to the customer.
    expected_use: Email an open invoice to the customer's billing address.
    auto_execute: false
    required_scopes: [read_write]
    risk: { category: write, sensitivity: high }
    http:
      method: POST
      path: "/invoices/{invoice_id}/send"
    params:
      - { name: invoice_id, in: path, required: true, type: string }
