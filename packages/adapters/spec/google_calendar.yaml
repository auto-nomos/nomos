id: google_calendar
name: Google Calendar
version: 1.0.0
description: Google Calendar API — events and calendars.
homepage: https://developers.google.com/calendar/api

api_base: https://www.googleapis.com/calendar/v3

auth:
  kind: oauth2
  authorize_url: https://accounts.google.com/o/oauth2/v2/auth
  token_url: https://oauth2.googleapis.com/token
  default_scopes:
    - https://www.googleapis.com/auth/calendar.readonly
    - https://www.googleapis.com/auth/calendar.events
  pkce: true

actions:
  - id: list_events
    description: List upcoming events on a calendar.
    expected_use: See what's on the schedule before booking or summarizing.
    auto_execute: true
    required_scopes: [https://www.googleapis.com/auth/calendar.readonly]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/calendars/{calendarId}/events"
    params:
      - { name: calendarId, in: path, required: true, type: string, default: primary }
      - { name: timeMin, in: query, type: string, default_expr: "rfc3339(now())" }
      - { name: maxResults, in: query, type: integer, default: 25 }
      - { name: singleEvents, in: query, type: boolean, default: true }
      - { name: orderBy, in: query, type: string, default: startTime }

  - id: get_event
    description: Fetch a single event.
    expected_use: Inspect attendees, location, description.
    auto_execute: true
    required_scopes: [https://www.googleapis.com/auth/calendar.readonly]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/calendars/{calendarId}/events/{eventId}"
    params:
      - { name: calendarId, in: path, required: true, type: string, default: primary }
      - { name: eventId, in: path, required: true, type: string }

  - id: create_event
    description: Create a calendar event.
    expected_use: Book a meeting or block focus time.
    auto_execute: false
    required_scopes: [https://www.googleapis.com/auth/calendar.events]
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/calendars/{calendarId}/events"
    params:
      - { name: calendarId, in: path, required: true, type: string, default: primary }
      - { name: summary, in: body, required: true, type: string }
      - { name: description, in: body, type: string }
      - { name: start, in: body, required: true, type: object }
      - { name: end, in: body, required: true, type: object }
      - { name: attendees, in: body, type: array }
      - { name: location, in: body, type: string }

  - id: update_event
    description: Modify an event.
    expected_use: Reschedule or update details.
    auto_execute: false
    required_scopes: [https://www.googleapis.com/auth/calendar.events]
    risk: { category: write, sensitivity: medium }
    http:
      method: PATCH
      path: "/calendars/{calendarId}/events/{eventId}"
    params:
      - { name: calendarId, in: path, required: true, type: string, default: primary }
      - { name: eventId, in: path, required: true, type: string }
      - { name: summary, in: body, type: string }
      - { name: start, in: body, type: object }
      - { name: end, in: body, type: object }
      - { name: attendees, in: body, type: array }

  - id: delete_event
    description: Delete a calendar event.
    expected_use: Cancel a meeting.
    auto_execute: false
    required_scopes: [https://www.googleapis.com/auth/calendar.events]
    risk: { category: delete, sensitivity: medium }
    http:
      method: DELETE
      path: "/calendars/{calendarId}/events/{eventId}"
    params:
      - { name: calendarId, in: path, required: true, type: string, default: primary }
      - { name: eventId, in: path, required: true, type: string }

  - id: list_calendars
    description: List calendars the user has access to.
    expected_use: Discover available calendars before scheduling.
    auto_execute: true
    required_scopes: [https://www.googleapis.com/auth/calendar.readonly]
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: "/users/me/calendarList"
    params:
      - { name: maxResults, in: query, type: integer, default: 50 }

  - id: get_calendar
    description: Fetch metadata for a single calendar.
    expected_use: Inspect timezone and access role before booking.
    auto_execute: true
    required_scopes: [https://www.googleapis.com/auth/calendar.readonly]
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: "/calendars/{calendarId}"
    params:
      - { name: calendarId, in: path, required: true, type: string, default: primary }

  - id: list_attendees_freebusy
    description: Query free/busy intervals for one or more calendars.
    expected_use: Find an open slot for scheduling.
    auto_execute: true
    required_scopes: [https://www.googleapis.com/auth/calendar.readonly]
    risk: { category: read, sensitivity: medium }
    http:
      method: POST
      path: "/freeBusy"
    params:
      - { name: timeMin, in: body, required: true, type: string }
      - { name: timeMax, in: body, required: true, type: string }
      - { name: items, in: body, required: true, type: array, description: "[{ id: <calendarId> }, ...]" }

  - id: quick_add
    description: Create an event from a natural-language description.
    expected_use: Quickly file an event without filling in structured fields.
    auto_execute: false
    required_scopes: [https://www.googleapis.com/auth/calendar.events]
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/calendars/{calendarId}/events/quickAdd"
    params:
      - { name: calendarId, in: path, required: true, type: string, default: primary }
      - { name: text, in: query, required: true, type: string }

  - id: create_calendar
    description: Create a new secondary calendar.
    expected_use: Provision a project or team calendar.
    auto_execute: false
    required_scopes: [https://www.googleapis.com/auth/calendar]
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/calendars"
    params:
      - { name: summary, in: body, required: true, type: string }
      - { name: timeZone, in: body, type: string }

  - id: delete_calendar
    description: Permanently delete a secondary calendar.
    expected_use: Remove a calendar that is no longer needed.
    auto_execute: false
    required_scopes: [https://www.googleapis.com/auth/calendar]
    risk: { category: delete, sensitivity: high }
    http:
      method: DELETE
      path: "/calendars/{calendarId}"
    params:
      - { name: calendarId, in: path, required: true, type: string }

  - id: move_event
    description: Move an event to a different calendar.
    expected_use: Reassign an event between calendars.
    auto_execute: false
    required_scopes: [https://www.googleapis.com/auth/calendar.events]
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/calendars/{calendarId}/events/{eventId}/move"
    params:
      - { name: calendarId, in: path, required: true, type: string, default: primary }
      - { name: eventId, in: path, required: true, type: string }
      - { name: destination, in: query, required: true, type: string }

  - id: import_event
    description: Import an externally-created event into a calendar.
    expected_use: Mirror an event from another system into Google Calendar.
    auto_execute: false
    required_scopes: [https://www.googleapis.com/auth/calendar.events]
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/calendars/{calendarId}/events/import"
    params:
      - { name: calendarId, in: path, required: true, type: string, default: primary }
      - { name: summary, in: body, required: true, type: string }
      - { name: start, in: body, required: true, type: object }
      - { name: end, in: body, required: true, type: object }
      - { name: iCalUID, in: body, required: true, type: string }
      - { name: description, in: body, type: string }
      - { name: attendees, in: body, type: array }
      - { name: location, in: body, type: string }
