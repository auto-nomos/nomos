# GitHub adapter — pilot spec for M2 framework, also serves as the canonical
# example for porting the existing TS connector at apps/control-plane/src/oauth/connectors/github.ts
# to the YAML-driven model. Keeps GitHub OAuth Apps as the dev path; bot-token GitHub Apps work
# via the same auth.kind=oauth2 because GitHub returns the same fields.

id: github
name: GitHub
version: 1.0.0
description: GitHub REST API — issues, repos, users.
homepage: https://docs.github.com/en/rest

api_base: https://api.github.com

auth:
  kind: oauth2
  authorize_url: https://github.com/login/oauth/authorize
  token_url: https://github.com/login/oauth/access_token
  default_scopes:
    - repo
    - read:user
  pkce: false

actions:
  - id: list_issues
    description: List issues for a repository.
    expected_use: Browse issues for triage or context before deciding what to act on.
    auto_execute: true
    required_scopes:
      - repo
    risk:
      category: read
      sensitivity: low
    http:
      method: GET
      path: "/repos/{owner}/{repo}/issues"
    params:
      - name: owner
        in: path
        required: true
        type: string
        description: Repository owner (user or org).
      - name: repo
        in: path
        required: true
        type: string
        description: Repository name.
      - name: state
        in: query
        type: string
        default: open
        enum: [open, closed, all]
        description: Filter by issue state.
      - name: per_page
        in: query
        type: integer
        default: 30
        description: Items per page (max 100).
    response:
      type: array
      sanitize:
        - field: items[].user.email
          redact: true

  - id: get_issue
    description: Fetch a single issue.
    expected_use: Read full issue body to inform a triage decision or summary.
    auto_execute: true
    required_scopes:
      - repo
    risk:
      category: read
      sensitivity: low
    http:
      method: GET
      path: "/repos/{owner}/{repo}/issues/{issue_number}"
    params:
      - name: owner
        in: path
        required: true
        type: string
      - name: repo
        in: path
        required: true
        type: string
      - name: issue_number
        in: path
        required: true
        type: integer

  - id: create_repo
    description: Create a new GitHub repository under the authenticated user or org.
    expected_use: Scaffold a new project or mirror repo as part of an automation workflow.
    auto_execute: false
    required_scopes:
      - repo
    risk:
      category: write
      sensitivity: high
    http:
      method: POST
      path: "/user/repos"
    params:
      - name: name
        in: body
        required: true
        type: string
        description: Repository name.
      - name: description
        in: body
        type: string
        description: Short description of the repository.
      - name: private
        in: body
        type: boolean
        default: true
        description: Whether the repository is private.
      - name: auto_init
        in: body
        type: boolean
        description: Initialize with a README.

  - id: create_issue
    description: Open a new issue.
    expected_use: File a bug or task as part of triage.
    auto_execute: false
    required_scopes:
      - repo
    risk:
      category: write
      sensitivity: medium
    http:
      method: POST
      path: "/repos/{owner}/{repo}/issues"
    params:
      - name: owner
        in: path
        required: true
        type: string
      - name: repo
        in: path
        required: true
        type: string
      - name: title
        in: body
        required: true
        type: string
      - name: body
        in: body
        type: string
      - name: labels
        in: body
        type: array
      - name: assignees
        in: body
        type: array

  - id: comment_on_issue
    description: Add a comment to an existing issue.
    expected_use: Reply to triage discussion or post a status update.
    auto_execute: false
    required_scopes:
      - repo
    risk:
      category: write
      sensitivity: medium
    http:
      method: POST
      path: "/repos/{owner}/{repo}/issues/{issue_number}/comments"
    params:
      - name: owner
        in: path
        required: true
        type: string
      - name: repo
        in: path
        required: true
        type: string
      - name: issue_number
        in: path
        required: true
        type: integer
      - name: body
        in: body
        required: true
        type: string

  - id: list_repos
    description: List repositories for the authenticated user.
    expected_use: Discover which repos the user owns / collaborates on.
    auto_execute: true
    required_scopes:
      - repo
      - read:user
    risk:
      category: read
      sensitivity: low
    http:
      method: GET
      path: /user/repos
    params:
      - name: visibility
        in: query
        type: string
        default: all
        enum: [all, public, private]
      - name: per_page
        in: query
        type: integer
        default: 50

  - id: get_user
    description: Get the authenticated user's profile.
    expected_use: Identify which GitHub account the agent is acting as.
    auto_execute: true
    required_scopes:
      - read:user
    risk:
      category: read
      sensitivity: low
    http:
      method: GET
      path: /user
    response:
      type: object
      sanitize:
        - field: email
          redact: true

  - id: close_issue
    description: Close an existing issue.
    expected_use: Resolve an issue that has been handled.
    auto_execute: false
    required_scopes:
      - repo
    risk:
      category: write
      sensitivity: medium
    http:
      method: PATCH
      path: "/repos/{owner}/{repo}/issues/{issue_number}"
    params:
      - name: owner
        in: path
        required: true
        type: string
      - name: repo
        in: path
        required: true
        type: string
      - name: issue_number
        in: path
        required: true
        type: integer
      - name: state
        in: body
        required: true
        type: string
        default: closed
        enum: [closed]

  - id: delete_repo
    description: Permanently delete a repository.
    expected_use: Reserved for housekeeping; almost never invoked by an agent.
    auto_execute: false
    required_scopes:
      - delete_repo
    risk:
      category: delete
      sensitivity: high
    http:
      method: DELETE
      path: "/repos/{owner}/{repo}"
    params:
      - name: owner
        in: path
        required: true
        type: string
      - name: repo
        in: path
        required: true
        type: string

  - id: get_repo
    description: Fetch metadata for a single repository.
    expected_use: Read repo metadata (default branch, visibility, etc.) before further action.
    auto_execute: true
    required_scopes:
      - repo
    risk:
      category: read
      sensitivity: low
    http:
      method: GET
      path: "/repos/{owner}/{repo}"
    params:
      - name: owner
        in: path
        required: true
        type: string
      - name: repo
        in: path
        required: true
        type: string

  - id: list_branches
    description: List branches for a repository.
    expected_use: Enumerate branches before opening a PR or for housekeeping summaries.
    auto_execute: true
    required_scopes:
      - repo
    risk:
      category: read
      sensitivity: low
    http:
      method: GET
      path: "/repos/{owner}/{repo}/branches"
    params:
      - name: owner
        in: path
        required: true
        type: string
      - name: repo
        in: path
        required: true
        type: string
      - name: per_page
        in: query
        type: integer
        default: 30

  - id: get_file_contents
    description: Read a file or directory from a repository at a ref.
    expected_use: Inspect repo content (README, config, source) prior to a write or review.
    auto_execute: true
    required_scopes:
      - repo
    risk:
      category: read
      sensitivity: low
    http:
      method: GET
      path: "/repos/{owner}/{repo}/contents/{path}"
    params:
      - name: owner
        in: path
        required: true
        type: string
      - name: repo
        in: path
        required: true
        type: string
      - name: path
        in: path
        required: true
        type: string
        description: File or directory path within the repo.
      - name: ref
        in: query
        type: string
        description: Branch, tag, or commit SHA. Defaults to default branch.

  - id: list_prs
    description: List pull requests for a repository.
    expected_use: Triage open PRs or audit recently merged work.
    auto_execute: true
    required_scopes:
      - repo
    risk:
      category: read
      sensitivity: low
    http:
      method: GET
      path: "/repos/{owner}/{repo}/pulls"
    params:
      - name: owner
        in: path
        required: true
        type: string
      - name: repo
        in: path
        required: true
        type: string
      - name: state
        in: query
        type: string
        default: open
        enum: [open, closed, all]
      - name: per_page
        in: query
        type: integer
        default: 30

  - id: get_pr
    description: Fetch a single pull request.
    expected_use: Read PR title, body, mergeable state before commenting or merging.
    auto_execute: true
    required_scopes:
      - repo
    risk:
      category: read
      sensitivity: low
    http:
      method: GET
      path: "/repos/{owner}/{repo}/pulls/{pull_number}"
    params:
      - name: owner
        in: path
        required: true
        type: string
      - name: repo
        in: path
        required: true
        type: string
      - name: pull_number
        in: path
        required: true
        type: integer

  - id: create_pr
    description: Open a new pull request from `head` into `base`.
    expected_use: Submit a code change for review; never auto-execute without policy approval.
    auto_execute: false
    required_scopes:
      - repo
    risk:
      category: write
      sensitivity: medium
    http:
      method: POST
      path: "/repos/{owner}/{repo}/pulls"
    params:
      - name: owner
        in: path
        required: true
        type: string
      - name: repo
        in: path
        required: true
        type: string
      - name: title
        in: body
        required: true
        type: string
      - name: head
        in: body
        required: true
        type: string
        description: Source branch (or `owner:branch` for cross-fork).
      - name: base
        in: body
        required: true
        type: string
        description: Target branch.
      - name: body
        in: body
        type: string
      - name: draft
        in: body
        type: boolean
        default: false

  - id: merge_pr
    description: Merge a pull request.
    expected_use: Land an approved PR. Always require explicit user step-up for production repos.
    auto_execute: false
    required_scopes:
      - repo
    risk:
      category: write
      sensitivity: high
    http:
      method: PUT
      path: "/repos/{owner}/{repo}/pulls/{pull_number}/merge"
    params:
      - name: owner
        in: path
        required: true
        type: string
      - name: repo
        in: path
        required: true
        type: string
      - name: pull_number
        in: path
        required: true
        type: integer
      - name: merge_method
        in: body
        type: string
        default: merge
        enum: [merge, squash, rebase]
      - name: commit_title
        in: body
        type: string
      - name: commit_message
        in: body
        type: string

  - id: update_file
    description: Create or update a file at a path; commits to the named branch.
    expected_use: Commit a generated or edited file as part of an automation.
    auto_execute: false
    required_scopes: [repo]
    risk: { category: write, sensitivity: medium }
    http:
      method: PUT
      path: "/repos/{owner}/{repo}/contents/{path}"
    params:
      - { name: owner, in: path, required: true, type: string }
      - { name: repo, in: path, required: true, type: string }
      - { name: path, in: path, required: true, type: string }
      - { name: message, in: body, required: true, type: string }
      - { name: content, in: body, required: true, type: string, description: "Base64-encoded file contents." }
      - { name: branch, in: body, type: string }
      - { name: sha, in: body, type: string, description: "Required when updating an existing file." }

  - id: list_commits
    description: List commits on a branch or path.
    expected_use: Audit recent history or build a change summary.
    auto_execute: true
    required_scopes: [repo]
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: "/repos/{owner}/{repo}/commits"
    params:
      - { name: owner, in: path, required: true, type: string }
      - { name: repo, in: path, required: true, type: string }
      - { name: sha, in: query, type: string }
      - { name: path, in: query, type: string }
      - { name: author, in: query, type: string }
      - { name: per_page, in: query, type: integer, default: 30 }

  - id: search_issues
    description: Search issues and pull requests across GitHub.
    expected_use: Find issues matching a free-text query for triage.
    auto_execute: true
    required_scopes: [repo]
    risk: { category: search, sensitivity: low }
    http:
      method: GET
      path: "/search/issues"
    params:
      - { name: q, in: query, required: true, type: string }
      - { name: sort, in: query, type: string }
      - { name: order, in: query, type: string, enum: [asc, desc] }
      - { name: per_page, in: query, type: integer, default: 30 }

  - id: search_repos
    description: Search public and accessible repositories.
    expected_use: Discover repos matching a query.
    auto_execute: true
    required_scopes: [repo]
    risk: { category: search, sensitivity: low }
    http:
      method: GET
      path: "/search/repositories"
    params:
      - { name: q, in: query, required: true, type: string }
      - { name: sort, in: query, type: string }
      - { name: order, in: query, type: string, enum: [asc, desc] }
      - { name: per_page, in: query, type: integer, default: 30 }

  - id: list_labels
    description: List labels in a repository.
    expected_use: Discover available labels before applying.
    auto_execute: true
    required_scopes: [repo]
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: "/repos/{owner}/{repo}/labels"
    params:
      - { name: owner, in: path, required: true, type: string }
      - { name: repo, in: path, required: true, type: string }
      - { name: per_page, in: query, type: integer, default: 30 }

  - id: add_labels_to_issue
    description: Add labels to an issue.
    expected_use: Tag an issue for triage or routing.
    auto_execute: false
    required_scopes: [repo]
    risk: { category: write, sensitivity: low }
    http:
      method: POST
      path: "/repos/{owner}/{repo}/issues/{issue_number}/labels"
    params:
      - { name: owner, in: path, required: true, type: string }
      - { name: repo, in: path, required: true, type: string }
      - { name: issue_number, in: path, required: true, type: integer }
      - { name: labels, in: body, required: true, type: array }

  - id: list_issue_comments
    description: List comments on an issue.
    expected_use: Read discussion history before replying.
    auto_execute: true
    required_scopes: [repo]
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: "/repos/{owner}/{repo}/issues/{issue_number}/comments"
    params:
      - { name: owner, in: path, required: true, type: string }
      - { name: repo, in: path, required: true, type: string }
      - { name: issue_number, in: path, required: true, type: integer }

  - id: create_release
    description: Create a release for a tag.
    expected_use: Publish a release as part of a deploy workflow.
    auto_execute: false
    required_scopes: [repo]
    risk: { category: write, sensitivity: high }
    http:
      method: POST
      path: "/repos/{owner}/{repo}/releases"
    params:
      - { name: owner, in: path, required: true, type: string }
      - { name: repo, in: path, required: true, type: string }
      - { name: tag_name, in: body, required: true, type: string }
      - { name: name, in: body, type: string }
      - { name: body, in: body, type: string }
      - { name: draft, in: body, type: boolean, default: false }
      - { name: prerelease, in: body, type: boolean, default: false }

  - id: list_workflow_runs
    description: List Actions workflow runs for a repository.
    expected_use: Audit recent CI activity or check deploy status.
    auto_execute: true
    required_scopes: [repo]
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: "/repos/{owner}/{repo}/actions/runs"
    params:
      - { name: owner, in: path, required: true, type: string }
      - { name: repo, in: path, required: true, type: string }
      - { name: branch, in: query, type: string }
      - { name: status, in: query, type: string }
      - { name: per_page, in: query, type: integer, default: 30 }

  - id: trigger_workflow
    description: Trigger a workflow_dispatch event for an Actions workflow.
    expected_use: Kick off a deploy, release, or other workflow that supports manual dispatch.
    auto_execute: false
    required_scopes: [repo]
    risk: { category: write, sensitivity: high }
    http:
      method: POST
      path: "/repos/{owner}/{repo}/actions/workflows/{workflow_id}/dispatches"
    params:
      - { name: owner, in: path, required: true, type: string }
      - { name: repo, in: path, required: true, type: string }
      - { name: workflow_id, in: path, required: true, type: string }
      - { name: ref, in: body, required: true, type: string }
      - { name: inputs, in: body, type: object }

  - id: list_pr_reviews
    description: List reviews on a pull request.
    expected_use: Read prior reviewer feedback before submitting your own.
    auto_execute: true
    required_scopes: [repo]
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: "/repos/{owner}/{repo}/pulls/{pull_number}/reviews"
    params:
      - { name: owner, in: path, required: true, type: string }
      - { name: repo, in: path, required: true, type: string }
      - { name: pull_number, in: path, required: true, type: integer }

  - id: submit_review
    description: Submit a review on a pull request (approve, request changes, or comment).
    expected_use: Record an automated or assisted code review decision.
    auto_execute: false
    required_scopes: [repo]
    risk: { category: write, sensitivity: high }
    http:
      method: POST
      path: "/repos/{owner}/{repo}/pulls/{pull_number}/reviews"
    params:
      - { name: owner, in: path, required: true, type: string }
      - { name: repo, in: path, required: true, type: string }
      - { name: pull_number, in: path, required: true, type: integer }
      - { name: body, in: body, type: string }
      - { name: event, in: body, required: true, type: string, enum: [APPROVE, REQUEST_CHANGES, COMMENT] }
      - { name: comments, in: body, type: array }

notes: |
  - Issue numbering: GitHub uses sequential per-repo integers, not the global node_id.
  - Rate limit: 5000 req/hr authenticated; surface 403 + X-RateLimit-Remaining header.
  - Refresh: GitHub OAuth Apps issue non-expiring tokens with no refresh_token.
    GitHub Apps issue refresh tokens (treated transparently by the OAuth executor).
