id: notion
name: Notion
version: 1.0.0
description: Notion API — pages, databases, blocks.
homepage: https://developers.notion.com

api_base: https://api.notion.com/v1

auth:
  kind: oauth2
  authorize_url: https://api.notion.com/v1/oauth/authorize
  token_url: https://api.notion.com/v1/oauth/token
  default_scopes: []
  pkce: false

actions:
  - id: search
    description: Search pages and databases by title or content.
    expected_use: Find relevant pages before reading or editing.
    auto_execute: true
    required_scopes: []
    risk: { category: search, sensitivity: low }
    http:
      method: POST
      path: "/search"
    params:
      - { name: query, in: body, required: true, type: string }
      - { name: page_size, in: body, type: integer, default: 25 }

  - id: get_page
    description: Fetch a Notion page by id.
    expected_use: Read page properties and metadata.
    auto_execute: true
    required_scopes: []
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: "/pages/{page_id}"
    params:
      - { name: page_id, in: path, required: true, type: string }

  - id: list_block_children
    description: List the blocks (paragraphs, lists, etc.) of a page.
    expected_use: Read page body.
    auto_execute: true
    required_scopes: []
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: "/blocks/{block_id}/children"
    params:
      - { name: block_id, in: path, required: true, type: string }
      - { name: page_size, in: query, type: integer, default: 50 }

  - id: append_block_children
    description: Append blocks to a page.
    expected_use: Add a status update or note to an existing page.
    auto_execute: false
    required_scopes: []
    risk: { category: write, sensitivity: medium }
    http:
      method: PATCH
      path: "/blocks/{block_id}/children"
    params:
      - { name: block_id, in: path, required: true, type: string }
      - { name: children, in: body, required: true, type: array }

  - id: create_page
    description: Create a new page in a database or under a parent page.
    expected_use: File an entry in a tracker or knowledge base.
    auto_execute: false
    required_scopes: []
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/pages"
    params:
      - { name: parent, in: body, required: true, type: object }
      - { name: properties, in: body, required: true, type: object }
      - { name: children, in: body, type: array }

  - id: query_database
    description: Query a Notion database with filters and sorts.
    expected_use: Read structured data from a tracker.
    auto_execute: true
    required_scopes: []
    risk: { category: search, sensitivity: low }
    http:
      method: POST
      path: "/databases/{database_id}/query"
    params:
      - { name: database_id, in: path, required: true, type: string }
      - { name: filter, in: body, type: object }
      - { name: sorts, in: body, type: array }
      - { name: page_size, in: body, type: integer, default: 25 }

  - id: update_page
    description: Update properties or archive state of a page.
    expected_use: Change a status, due date, or assignee on a tracker entry.
    auto_execute: false
    required_scopes: []
    risk: { category: write, sensitivity: medium }
    http:
      method: PATCH
      path: "/pages/{page_id}"
    params:
      - { name: page_id, in: path, required: true, type: string }
      - { name: properties, in: body, type: object }
      - { name: archived, in: body, type: boolean }

  - id: get_database
    description: Retrieve a database's schema and metadata.
    expected_use: Inspect database columns before querying or creating entries.
    auto_execute: true
    required_scopes: []
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: "/databases/{database_id}"
    params:
      - { name: database_id, in: path, required: true, type: string }

  - id: list_users
    description: List users in the workspace.
    expected_use: Resolve a user mention or build an assignee picker.
    auto_execute: true
    required_scopes: []
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/users"
    params:
      - { name: page_size, in: query, type: integer, default: 50 }

  - id: get_user
    description: Fetch a single user by id.
    expected_use: Look up a specific Notion user.
    auto_execute: true
    required_scopes: []
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: "/users/{user_id}"
    params:
      - { name: user_id, in: path, required: true, type: string }

  - id: delete_block
    description: Archive (soft-delete) a block.
    expected_use: Remove an obsolete paragraph or list item.
    auto_execute: false
    required_scopes: []
    risk: { category: delete, sensitivity: medium }
    http:
      method: DELETE
      path: "/blocks/{block_id}"
    params:
      - { name: block_id, in: path, required: true, type: string }

  - id: create_database
    description: Create a new Notion database under a parent page.
    expected_use: Provision a tracker database programmatically.
    auto_execute: false
    required_scopes: []
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/databases"
    params:
      - { name: parent, in: body, required: true, type: object }
      - { name: title, in: body, required: true, type: array }
      - { name: properties, in: body, required: true, type: object }

  - id: update_database
    description: Update a database's title or property schema.
    expected_use: Rename a tracker or add a new column.
    auto_execute: false
    required_scopes: []
    risk: { category: write, sensitivity: medium }
    http:
      method: PATCH
      path: "/databases/{database_id}"
    params:
      - { name: database_id, in: path, required: true, type: string }
      - { name: title, in: body, type: array }
      - { name: properties, in: body, type: object }

  - id: retrieve_block
    description: Fetch a single block by id.
    expected_use: Inspect a block's content before updating.
    auto_execute: true
    required_scopes: []
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: "/blocks/{block_id}"
    params:
      - { name: block_id, in: path, required: true, type: string }

  - id: update_block
    description: Update a block's content (block-type-specific payload).
    expected_use: Edit a paragraph, heading, or list item in place.
    auto_execute: false
    required_scopes: []
    risk: { category: write, sensitivity: medium }
    http:
      method: PATCH
      path: "/blocks/{block_id}"
    params:
      - { name: block_id, in: path, required: true, type: string }
      - { name: paragraph, in: body, type: object }
      - { name: heading_1, in: body, type: object }
      - { name: heading_2, in: body, type: object }
      - { name: heading_3, in: body, type: object }
      - { name: to_do, in: body, type: object }
      - { name: bulleted_list_item, in: body, type: object }
      - { name: numbered_list_item, in: body, type: object }
      - { name: archived, in: body, type: boolean }

  - id: list_comments
    description: List comments on a block or page.
    expected_use: Read discussion before replying.
    auto_execute: true
    required_scopes: []
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: "/comments"
    params:
      - { name: block_id, in: query, required: true, type: string }
      - { name: page_size, in: query, type: integer, default: 25 }

  - id: create_comment
    description: Post a comment on a page or existing discussion thread.
    expected_use: Reply to a discussion or post a status comment.
    auto_execute: false
    required_scopes: []
    risk: { category: write, sensitivity: low }
    http:
      method: POST
      path: "/comments"
    params:
      - { name: parent, in: body, required: true, type: object }
      - { name: rich_text, in: body, required: true, type: array }

  - id: get_bot_user
    description: Get the authenticated bot user.
    expected_use: Identify which Notion integration the agent is acting as.
    auto_execute: true
    required_scopes: []
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: "/users/me"
    params: []

notes: |
  Notion does not issue refresh tokens; access tokens are long-lived but the
  user can revoke them via Settings → Connected apps. Treat 401 as
  reauth-required.
