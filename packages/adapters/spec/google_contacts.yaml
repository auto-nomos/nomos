id: google_contacts
name: Google Contacts
version: 1.0.0
description: People API — contacts and contact groups.
homepage: https://developers.google.com/people

api_base: https://people.googleapis.com/v1

auth:
  kind: oauth2
  authorize_url: https://accounts.google.com/o/oauth2/v2/auth
  token_url: https://oauth2.googleapis.com/token
  default_scopes:
    - https://www.googleapis.com/auth/contacts.readonly
  pkce: true

actions:
  - id: list_contacts
    description: List the user's connections.
    expected_use: Look up emails or phone numbers before composing a message.
    auto_execute: true
    required_scopes: [https://www.googleapis.com/auth/contacts.readonly]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/people/me/connections"
    params:
      - { name: pageSize, in: query, type: integer, default: 100 }
      - { name: personFields, in: query, type: string, default: "names,emailAddresses,phoneNumbers" }

  - id: search_contacts
    description: Search contacts by name or email substring.
    expected_use: Resolve a partial name to a full contact record.
    auto_execute: true
    required_scopes: [https://www.googleapis.com/auth/contacts.readonly]
    risk: { category: search, sensitivity: medium }
    http:
      method: GET
      path: "/people:searchContacts"
    params:
      - { name: query, in: query, required: true, type: string }
      - { name: pageSize, in: query, type: integer, default: 25 }
      - { name: readMask, in: query, type: string, default: "names,emailAddresses,phoneNumbers" }

  - id: get_contact
    description: Fetch a contact by resource name.
    expected_use: Read full contact record.
    auto_execute: true
    required_scopes: [https://www.googleapis.com/auth/contacts.readonly]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/{resourceName}"
    params:
      - { name: resourceName, in: path, required: true, type: string }
      - { name: personFields, in: query, type: string, default: "names,emailAddresses,phoneNumbers,addresses" }

  - id: create_contact
    description: Create a new contact.
    expected_use: Add a new collaborator from a meeting attendee list.
    auto_execute: false
    required_scopes: [https://www.googleapis.com/auth/contacts]
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/people:createContact"
    params:
      - { name: names, in: body, type: array }
      - { name: emailAddresses, in: body, type: array }
      - { name: phoneNumbers, in: body, type: array }

  - id: update_contact
    description: Update an existing contact.
    expected_use: Fix a typo or update an email address.
    auto_execute: false
    required_scopes: [https://www.googleapis.com/auth/contacts]
    risk: { category: write, sensitivity: medium }
    http:
      method: PATCH
      path: "/{resourceName}:updateContact"
    params:
      - { name: resourceName, in: path, required: true, type: string }
      - { name: updatePersonFields, in: query, required: true, type: string }
      - { name: names, in: body, type: array }
      - { name: emailAddresses, in: body, type: array }

  - id: delete_contact
    description: Delete a contact.
    expected_use: Remove an outdated contact entry.
    auto_execute: false
    required_scopes: [https://www.googleapis.com/auth/contacts]
    risk: { category: delete, sensitivity: high }
    http:
      method: DELETE
      path: "/{resourceName}:deleteContact"
    params:
      - { name: resourceName, in: path, required: true, type: string }

  - id: list_contact_groups
    description: List the user's contact groups.
    expected_use: Find a group to add a contact to.
    auto_execute: true
    required_scopes: [https://www.googleapis.com/auth/contacts.readonly]
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: "/contactGroups"
    params:
      - { name: pageSize, in: query, type: integer, default: 25 }

  - id: get_contact_group
    description: Get a contact group by resource name.
    expected_use: Inspect group membership before sending invites.
    auto_execute: true
    required_scopes: [https://www.googleapis.com/auth/contacts.readonly]
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: "/{resourceName}"
    params:
      - { name: resourceName, in: path, required: true, type: string }

  - id: batch_get_contacts
    description: Get multiple contacts in one call.
    expected_use: Resolve a list of resource names to full records.
    auto_execute: true
    required_scopes: [https://www.googleapis.com/auth/contacts.readonly]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/people:batchGet"
    params:
      - { name: resourceNames, in: query, required: true, type: string }
      - { name: personFields, in: query, type: string, default: "names,emailAddresses" }
