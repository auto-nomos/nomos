id: slack
name: Slack
version: 1.0.0
description: Slack Web API — channels, messages, users.
homepage: https://api.slack.com/web

api_base: https://slack.com/api

auth:
  kind: oauth2
  authorize_url: https://slack.com/oauth/v2/authorize
  token_url: https://slack.com/api/oauth.v2.access
  default_scopes:
    - channels:read
    - chat:write
    - users:read
  pkce: false

actions:
  - id: list_channels
    description: List public channels in the workspace.
    expected_use: Discover where to post / find context.
    auto_execute: true
    required_scopes: [channels:read]
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: "/conversations.list"
    params:
      - { name: types, in: query, type: string, default: public_channel }
      - { name: limit, in: query, type: integer, default: 100 }

  - id: post_message
    description: Post a message to a channel.
    expected_use: Send notifications, status updates, or reply in a thread.
    auto_execute: false
    required_scopes: [chat:write]
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/chat.postMessage"
    params:
      - { name: channel, in: body, required: true, type: string }
      - { name: text, in: body, required: true, type: string }
      - { name: thread_ts, in: body, type: string }
      - { name: blocks, in: body, type: array }

  - id: get_user_info
    description: Look up a Slack user by id.
    expected_use: Resolve a user mention to a real identity.
    auto_execute: true
    required_scopes: [users:read]
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: "/users.info"
    params:
      - { name: user, in: query, required: true, type: string }
    response:
      type: object
      sanitize:
        - { field: user.profile.email, redact: true }
        - { field: user.profile.phone, redact: true }

  - id: list_recent_messages
    description: List recent messages in a channel.
    expected_use: Read recent traffic to inform a reply.
    auto_execute: true
    required_scopes: [channels:history]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/conversations.history"
    params:
      - { name: channel, in: query, required: true, type: string }
      - { name: limit, in: query, type: integer, default: 50 }

  - id: react_to_message
    description: Add an emoji reaction to a message.
    expected_use: Acknowledge a message without posting.
    auto_execute: false
    required_scopes: [reactions:write]
    risk: { category: write, sensitivity: low }
    http:
      method: POST
      path: "/reactions.add"
    params:
      - { name: channel, in: body, required: true, type: string }
      - { name: name, in: body, required: true, type: string }
      - { name: timestamp, in: body, required: true, type: string }

  - id: list_users
    description: List members of the workspace.
    expected_use: Resolve usernames or build a directory.
    auto_execute: true
    required_scopes: [users:read]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/users.list"
    params:
      - { name: limit, in: query, type: integer, default: 200 }
      - { name: cursor, in: query, type: string }

  - id: get_user_by_email
    description: Look up a Slack user by email address.
    expected_use: Resolve an email to a workspace member.
    auto_execute: true
    required_scopes: [users:read.email]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/users.lookupByEmail"
    params:
      - { name: email, in: query, required: true, type: string }

  - id: update_message
    description: Edit a previously posted message.
    expected_use: Correct or amend a prior message; never auto-execute on user-facing channels.
    auto_execute: false
    required_scopes: [chat:write]
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/chat.update"
    params:
      - { name: channel, in: body, required: true, type: string }
      - { name: ts, in: body, required: true, type: string }
      - { name: text, in: body, required: true, type: string }
      - { name: blocks, in: body, type: array }

  - id: delete_message
    description: Permanently delete a message.
    expected_use: Remove a message posted in error. Requires explicit user approval.
    auto_execute: false
    required_scopes: [chat:write]
    risk: { category: delete, sensitivity: high }
    http:
      method: POST
      path: "/chat.delete"
    params:
      - { name: channel, in: body, required: true, type: string }
      - { name: ts, in: body, required: true, type: string }

  - id: reply_in_thread
    description: Reply in an existing thread.
    expected_use: Continue a conversation without polluting the main channel.
    auto_execute: false
    required_scopes: [chat:write]
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/chat.postMessage"
    params:
      - { name: channel, in: body, required: true, type: string }
      - { name: thread_ts, in: body, required: true, type: string }
      - { name: text, in: body, required: true, type: string }
      - { name: blocks, in: body, type: array }

  - id: upload_file
    description: Upload a file to one or more channels.
    expected_use: Share a generated artifact (report, image) into a channel.
    auto_execute: false
    required_scopes: [files:write]
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/files.upload"
    params:
      - { name: channels, in: body, required: true, type: string }
      - { name: content, in: body, type: string }
      - { name: filename, in: body, type: string }
      - { name: title, in: body, type: string }
      - { name: initial_comment, in: body, type: string }

  - id: open_dm
    description: Open a direct-message conversation with one or more users.
    expected_use: Start a 1:1 or group DM before posting.
    auto_execute: false
    required_scopes: [im:write]
    risk: { category: write, sensitivity: low }
    http:
      method: POST
      path: "/conversations.open"
    params:
      - { name: users, in: body, required: true, type: string, description: "Comma-separated user ids." }

  - id: get_channel_info
    description: Fetch metadata for a single channel.
    expected_use: Inspect channel topic, membership, or purpose before posting.
    auto_execute: true
    required_scopes: [channels:read]
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: "/conversations.info"
    params:
      - { name: channel, in: query, required: true, type: string }

  - id: search_messages
    description: Search messages across the workspace.
    expected_use: Find prior discussion before posting.
    auto_execute: true
    required_scopes: [search:read]
    risk: { category: search, sensitivity: medium }
    http:
      method: GET
      path: "/search.messages"
    params:
      - { name: query, in: query, required: true, type: string }
      - { name: sort, in: query, type: string }
      - { name: count, in: query, type: integer, default: 20 }

  - id: create_channel
    description: Create a new channel.
    expected_use: Provision a project or incident channel.
    auto_execute: false
    required_scopes: [channels:manage]
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/conversations.create"
    params:
      - { name: name, in: body, required: true, type: string }
      - { name: is_private, in: body, type: boolean, default: false }

  - id: invite_to_channel
    description: Invite one or more users to a channel.
    expected_use: Add teammates to a project or incident channel.
    auto_execute: false
    required_scopes: [channels:manage]
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/conversations.invite"
    params:
      - { name: channel, in: body, required: true, type: string }
      - { name: users, in: body, required: true, type: string, description: "Comma-separated user ids." }

  - id: pin_message
    description: Pin a message in a channel.
    expected_use: Highlight an important message for the channel.
    auto_execute: false
    required_scopes: [pins:write]
    risk: { category: write, sensitivity: low }
    http:
      method: POST
      path: "/pins.add"
    params:
      - { name: channel, in: body, required: true, type: string }
      - { name: timestamp, in: body, required: true, type: string }

  - id: schedule_message
    description: Schedule a message to post at a future time.
    expected_use: Queue a status update or reminder for later delivery.
    auto_execute: false
    required_scopes: [chat:write]
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/chat.scheduleMessage"
    params:
      - { name: channel, in: body, required: true, type: string }
      - { name: text, in: body, required: true, type: string }
      - { name: post_at, in: body, required: true, type: integer, description: "Unix epoch seconds." }

  - id: set_topic
    description: Set the topic for a channel.
    expected_use: Update channel topic with status or context.
    auto_execute: false
    required_scopes: [channels:manage]
    risk: { category: write, sensitivity: low }
    http:
      method: POST
      path: "/conversations.setTopic"
    params:
      - { name: channel, in: body, required: true, type: string }
      - { name: topic, in: body, required: true, type: string }

  - id: remove_reaction
    description: Remove an emoji reaction from a message.
    expected_use: Undo a reaction added in error.
    auto_execute: false
    required_scopes: [reactions:write]
    risk: { category: write, sensitivity: low }
    http:
      method: POST
      path: "/reactions.remove"
    params:
      - { name: channel, in: body, required: true, type: string }
      - { name: timestamp, in: body, required: true, type: string }
      - { name: name, in: body, required: true, type: string }

  - id: archive_channel
    description: Archive a channel (make it read-only).
    expected_use: Retire an old project channel.
    auto_execute: false
    required_scopes: [channels:manage, groups:write, im:write, mpim:write]
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/conversations.archive"
    params:
      - { name: channel, in: body, required: true, type: string }

  - id: unarchive_channel
    description: Unarchive a previously archived channel.
    expected_use: Restore an archived channel for active use.
    auto_execute: false
    required_scopes: [channels:manage, groups:write, im:write, mpim:write]
    risk: { category: write, sensitivity: medium }
    http:
      method: POST
      path: "/conversations.unarchive"
    params:
      - { name: channel, in: body, required: true, type: string }

  - id: list_files
    description: List uploaded files visible to the calling user.
    expected_use: Find a file the agent uploaded earlier.
    auto_execute: true
    required_scopes: [files:read]
    risk: { category: read, sensitivity: medium }
    http:
      method: GET
      path: "/files.list"
    params:
      - { name: channel, in: query, type: string }
      - { name: user, in: query, type: string }
      - { name: count, in: query, type: integer, default: 25 }

  - id: delete_file
    description: Permanently delete an uploaded file.
    expected_use: Clean up an attachment uploaded in error.
    auto_execute: false
    required_scopes: [files:write]
    risk: { category: delete, sensitivity: high }
    http:
      method: POST
      path: "/files.delete"
    params:
      - { name: file, in: body, required: true, type: string }

  - id: get_file_info
    description: Get metadata for a single file.
    expected_use: Inspect file ownership and type before sharing.
    auto_execute: true
    required_scopes: [files:read]
    risk: { category: read, sensitivity: low }
    http:
      method: GET
      path: "/files.info"
    params:
      - { name: file, in: query, required: true, type: string }

  - id: leave_channel
    description: Leave a channel the bot is a member of.
    expected_use: Step out of a channel after a temporary task.
    auto_execute: false
    required_scopes: [channels:manage, groups:write, im:write, mpim:write]
    risk: { category: write, sensitivity: low }
    http:
      method: POST
      path: "/conversations.leave"
    params:
      - { name: channel, in: body, required: true, type: string }
