[project]
name = "auto-nomos-sdk"
version = "0.0.1"
description = "Python SDK for Nomos — multi-agent orchestration security"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "auto-nomos" }]
dependencies = [
  "httpx>=0.27.0",
]

[project.urls]
Homepage = "https://github.com/auto-nomos/nomos"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
