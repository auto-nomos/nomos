name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22.18.0
  PNPM_VERSION: 11.0.8
  # DB-backed integration tests (e.g. the PDP postgres audit writer) need a
  # fully-migrated postgres, which this runner doesn't provide. Skip them here;
  # they run locally against `pnpm dev:up`. See apps/pdp/src/audit/__tests__/.
  SKIP_DB_TESTS: '1'

jobs:
  ci:
    name: Lint + typecheck + test + build
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      # Node must be set up BEFORE pnpm: pnpm/action-setup runs the pnpm
      # self-installer with whatever node is on PATH, and pnpm 11 requires
      # Node >=22.13 — the runner's default Node 20 fails ERR_PNPM_UNSUPPORTED_ENGINE.
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
          # standalone installs the @pnpm/exe build (bundles its own Node), so
          # the install does not fail the pnpm 11 engine check under the
          # runner's default Node 20.
          standalone: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm exec biome check .

      - name: Typecheck
        run: pnpm typecheck

      - name: Audit extractor coverage
        run: pnpm audit:extractors

      - name: Audit adapter parity
        run: pnpm audit:parity

      - name: Test (with coverage)
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: |
            packages/*/coverage/**
          retention-days: 14
          if-no-files-found: ignore
