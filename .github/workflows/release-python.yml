name: release python sdk

on:
  push:
    tags:
      - "python-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write          # PyPI trusted publishing (OIDC)

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-python
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install build + test deps
        run: |
          python -m pip install --upgrade pip
          pip install build pytest httpx
      - name: Install package
        run: pip install -e .
      - name: Run pytest
        run: pytest -q
      - name: Build sdist + wheel
        run: python -m build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: packages/sdk-python/dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/nomos-sdk
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist
          # No password — trusted publisher (OIDC). Configure once at:
          # https://pypi.org/manage/account/publishing/  (project: nomos-sdk)
