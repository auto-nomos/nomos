name: release python sdk

on:
  push:
    tags:
      - "python-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write          # PyPI trusted publishing (OIDC)

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build + test deps
        run: |
          python -m pip install --upgrade pip
          pip install build pytest httpx
      - name: Install package
        run: pip install -e .
      - name: Run pytest
        run: pytest -q
      - name: Build sdist + wheel
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/sdk-python/dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/nomos-sdk
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # No password — trusted publisher (OIDC). Configure once at:
          # https://pypi.org/manage/account/publishing/  (project: nomos-sdk)
