# Default values for cb-pdp.
# Required: image.repository + the controlPlane block + secret block.

replicaCount: 2

image:
  repository: ghcr.io/auto-nomos/cb-pdp
  pullPolicy: IfNotPresent
  tag: ""  # default to .Chart.AppVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

service:
  type: ClusterIP
  port: 8787

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: pdp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  # targetMemoryUtilizationPercentage: 80

# Optional PodDisruptionBudget (requires replicaCount > 1 or autoscaling
# enabled to be meaningful). Set minAvailable XOR maxUnavailable.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# Opt-in NetworkPolicy. Defaults to: allow all pods in the cluster to hit
# the PDP port; egress restricted to DNS + 443 (control-plane). Tighten
# ingress by listing the namespaces your agent pods run in.
networkPolicy:
  enabled: false
  agentNamespaces: []      # e.g. ["agents-prod","agents-staging"]
  allowIngressFromIngressController: false
  extraEgressPorts: []     # e.g. [5432] for an in-cluster postgres

# Prometheus Operator ServiceMonitor. Opt-in; the PDP exposes OTel
# metrics out of the box but no `/metrics` endpoint until OTel exporters
# are wired (set otelExporterEndpoint or pair with the OTel Collector).
serviceMonitor:
  enabled: false
  namespace: ""           # defaults to the release namespace
  metricsPath: /metrics
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  relabelings: []

# Required: where the control plane lives + service token + signed-bundle pubkey.
# secret.* values flow into a generated Secret consumed via env.
controlPlane:
  url: "https://api.credentialbroker.dev"

secret:
  # Service token issued for this customer (Bearer auth on /v1/internal/*).
  controlPlaneServiceToken: ""
  # Hex Ed25519 pubkey the control-plane signs bundles with. PDP refuses
  # bundles that don't verify against this key.
  bundleVerifyKey: ""

# Audit backend. `jsonl` writes to a tmpfs volume (lost on pod restart);
# `postgres` requires DATABASE_URL pointing at your own DB.
audit:
  backend: jsonl
  logPath: /var/audit/pdp.log
  databaseUrl: ""

# Optional: pin the customer set for offline operation. Leave empty to
# let the PDP discover from the control plane at boot + every 60s.
customerIdsOverride: ""

env:
  POLICY_REFRESH_MS: "60000"
  REVOCATION_REFRESH_MS: "5000"
  LOG_LEVEL: "info"
  OTEL_SERVICE_NAME: "cb-pdp"

# OTel: set when shipping traces. Leave commented for off.
# otelExporterEndpoint: "https://otlp.example.com"
# otelExporterHeaders: "authorization=Bearer ..."

nodeSelector: {}
tolerations: []
affinity: {}

# Tighten if your network policy whitelists egress.
egress:
  allowControlPlane: true
  allowOAuthProviders: true  # PDP doesn't directly talk to providers; CP does
