apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cb-pdp.fullname" . }}
  labels: {{- include "cb-pdp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "cb-pdp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "cb-pdp.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "cb-pdp.serviceAccountName" . }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: pdp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8787
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "cb-pdp.fullname" . }}-config
          env:
            - name: CONTROL_PLANE_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "cb-pdp.fullname" . }}-secrets
                  key: controlPlaneServiceToken
            - name: CONTROL_PLANE_BUNDLE_VERIFY_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cb-pdp.fullname" . }}-secrets
                  key: bundleVerifyKey
            {{- if .Values.audit.databaseUrl }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "cb-pdp.fullname" . }}-secrets
                  key: databaseUrl
            {{- end }}
          volumeMounts:
            - name: audit
              mountPath: /var/audit
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources: {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: audit
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
