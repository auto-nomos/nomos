apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cb-pdp.fullname" . }}-secrets
  labels: {{- include "cb-pdp.labels" . | nindent 4 }}
type: Opaque
stringData:
  controlPlaneServiceToken: {{ required "secret.controlPlaneServiceToken is required" .Values.secret.controlPlaneServiceToken | quote }}
  bundleVerifyKey: {{ required "secret.bundleVerifyKey is required" .Values.secret.bundleVerifyKey | quote }}
  {{- if .Values.audit.databaseUrl }}
  databaseUrl: {{ .Values.audit.databaseUrl | quote }}
  {{- end }}
