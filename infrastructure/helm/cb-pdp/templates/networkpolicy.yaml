{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cb-pdp.fullname" . }}
  labels: {{- include "cb-pdp.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "cb-pdp.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.agentNamespaces }}
    - from:
        {{- range .Values.networkPolicy.agentNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
    {{- else }}
    - ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
    {{- end }}
    {{- if .Values.networkPolicy.allowIngressFromIngressController }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
    {{- end }}
  egress:
    # DNS (kube-system CoreDNS)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Control plane (HTTPS)
    - ports:
        - protocol: TCP
          port: 443
    {{- with .Values.networkPolicy.extraEgressPorts }}
    {{- range . }}
    - ports:
        - protocol: TCP
          port: {{ . }}
    {{- end }}
    {{- end }}
{{- end }}
