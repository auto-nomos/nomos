# Nomos — nginx reverse proxy
# - api.auto-nomos.com  →  control-plane :8788
# - pdp.auto-nomos.com  →  pdp :8787
# - bare IP              →  control-plane (default_server)
#
# After DNS maps + certbot runs, this file gets SSL blocks auto-added.

upstream control_plane {
    server 127.0.0.1:8788;
    keepalive 16;
}

upstream pdp {
    server 127.0.0.1:8787;
    keepalive 16;
}

server {
    listen 80 default_server;
    server_name api.auto-nomos.com _;

    client_max_body_size 4m;

    location / {
        proxy_pass http://control_plane;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

server {
    listen 80;
    server_name pdp.auto-nomos.com;

    client_max_body_size 4m;

    location / {
        proxy_pass http://pdp;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
