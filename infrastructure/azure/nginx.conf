# Nomos — nginx reverse proxy
# - api.auto-nomos.com  →  control-plane :8788
# - pdp.auto-nomos.com  →  pdp :8787
# - id.auto-nomos.com   →  control-plane :8788 (OIDC issuer; only 2 paths exposed)
# - bare IP              →  control-plane (default_server)
#
# After DNS maps + certbot runs, this file gets SSL blocks auto-added.

upstream control_plane {
    server 127.0.0.1:8788;
    keepalive 16;
}

upstream pdp {
    server 127.0.0.1:8787;
    keepalive 16;
}

server {
    listen 80 default_server;
    server_name api.auto-nomos.com _;

    client_max_body_size 4m;

    location / {
        proxy_pass http://control_plane;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

server {
    listen 80;
    server_name pdp.auto-nomos.com;

    client_max_body_size 4m;

    location / {
        proxy_pass http://pdp;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# id.auto-nomos.com — public OIDC issuer surface.
#
# Exposes ONLY the two routes that AWS STS / Azure AD / GCP STS need to
# discover + verify ID tokens. All other paths return 404 so the bare
# control-plane API is not reachable through this hostname.
#
# Path mapping:
#   GET /.well-known/openid-configuration → control-plane verbatim
#   GET /jwks.json                        → control-plane /oidc/jwks.json
#   GET /healthz                          → 200 ok
#
# JWKS gets a public cache-control header so STS/AAD can cache up to 5min.
# Discovery doc caches 1h. Both are also edge-safe to fetch from any geo.
server {
    listen 80;
    server_name id.auto-nomos.com;

    client_max_body_size 4m;

    location = /healthz {
        add_header content-type text/plain;
        return 200 "ok";
    }

    location = /.well-known/openid-configuration {
        proxy_pass http://control_plane/.well-known/openid-configuration;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        add_header cache-control "public, max-age=3600" always;
        add_header access-control-allow-origin "*" always;
    }

    location = /jwks.json {
        proxy_pass http://control_plane/oidc/jwks.json;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        add_header cache-control "public, max-age=300" always;
        add_header access-control-allow-origin "*" always;
    }

    # Everything else: 404. Hard-fail any attempt to reach control-plane
    # internals through the issuer hostname.
    location / {
        return 404;
    }
}
