app = "cb-pdp-dev"
primary_region = "iad"

kill_signal = "SIGINT"
kill_timeout = "10s"

[build]
dockerfile = "../../apps/pdp/Dockerfile"
ignorefile = "../../apps/pdp/.dockerignore"

[env]
NODE_ENV = "production"
PORT = "8787"
LOG_LEVEL = "info"
POLICY_REFRESH_MS = "60000"
REVOCATION_REFRESH_MS = "5000"
AUDIT_LOG_PATH = "/tmp/audit.log"

[http_service]
internal_port = 8787
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

[[http_service.checks]]
interval = "10s"
timeout = "2s"
grace_period = "5s"
method = "GET"
path = "/healthz"

[[vm]]
size = "shared-cpu-1x"
memory_mb = 256
cpus = 1
